name: WASM Size Guard

on:
  push:
    paths:
      - 'contracts/**'
      - 'Cargo.toml'
      - '.github/**'
  pull_request:
    paths:
      - 'contracts/**'
      - 'Cargo.toml'
      - '.github/**'

jobs:
  build-and-check:
    name: Build optimized WASM and check size
    runs-on: ubuntu-latest
    env:
      # Default Soroban max size in bytes; update if Soroban changes this limit
      SOROBAN_MAX_WASM_BYTES: 200000
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (with wasm targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32v1-none

      - name: Build optimized WASM (release)
        run: |
          cargo build --workspace --target wasm32-unknown-unknown --release

      - name: Run WASM size check
        run: |
          chmod +x scripts/ci/check_wasm_size.sh
          scripts/ci/check_wasm_size.sh

      - name: Upload wasm artifacts (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: wasm-files
          path: target/wasm32-unknown-unknown/release/*.wasm
